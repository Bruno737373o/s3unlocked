name: .NET Core & ROM Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. Baixa o código do repositório
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. Instala o .NET para que as ferramentas em C# na pasta build_tools possam ser compiladas
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # 3. Procura e compila ferramentas C# (.csproj) se elas existirem, sem quebrar se não houver solução global
    - name: Build C# Tools
      run: |
        $projects = Get-ChildItem -Recurse -Filter *.csproj
        if ($projects) {
          foreach ($project in $projects) {
            Write-Host "Compilando ferramenta: $($project.FullName)"
            dotnet build "$($project.FullName)" -c Release
          }
        } else {
          Write-Host "Nenhum projeto C# encontrado em build_tools. Pulando etapa."
        }

    # 4. Executa o script que monta a ROM do Sonic 3 Unlocked
    - name: Compile ROM
      run: |
        .\build.bat

    # 5. Salva o arquivo final da ROM (.bin ou .md) para você baixar
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: S3-Unlocked-ROM
        path: |
          *.bin
          *.md
          
